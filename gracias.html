  <script>
    /* Confirmation reference + the canonical TikTok Purchase (CompletePayment).
       The purchase event is built from the URL params (t=total, o=offer) and
       fires INDEPENDENTLY of sessionStorage/hashing — value+currency must
       never be blocked by a missing email or a hung SHA-256 promise. Customer
       email/phone (from sessionStorage) are hashed best-effort and sent via
       ttq.identify BEFORE the track when available; if not, the event still
       fires. Once per reference (refresh-safe). */
    (function () {
      var p = new URLSearchParams(location.search);
      var ref = p.get('ref') || '';
      if (ref) { try { document.getElementById('gRef').textContent = ref; } catch (_) {} }

      var total = parseInt(p.get('t') || '0', 10) || 0;
      var offer = (p.get('o') || '').replace(/[^0-9]/g, '');
      var ident = {};
      try { ident = JSON.parse(sessionStorage.getItem('lt_lastOrder') || '{}') || {}; } catch (_) {}
      if (!total && ident.total) total = parseInt(ident.total, 10) || 0;
      if (!offer && ident.offer) offer = String(ident.offer).replace(/[^0-9]/g, '');

      // once-per-reference guard — blocks refresh re-fire, never the first fire
      var FIRED = 'lt_purchase_fired';
      try { if (ref && sessionStorage.getItem(FIRED) === ref) return; } catch (_) {}
      try { if (ref) sessionStorage.setItem(FIRED, ref); } catch (_) {}

      var contentId = 'body-' + (offer || '1') + 'pack';
      var payload = {
        value: total,
        currency: 'COP',
        content_type: 'product',
        content_id: contentId,
        contents: [{ content_id: contentId, content_type: 'product', quantity: 1, price: total }]
      };

      // ttq queue is created synchronously by the loader in <head>; fall back
      // to the array queue if needed so track() is always callable.
      var ttq = window.ttq = window.ttq || [];

      var fired = false;
      function firePurchase() {
        if (fired) return; fired = true;
        try { ttq.track('CompletePayment', payload); } catch (_) {}
      }

      function sha256(s) {
        if (!s || !(window.crypto && window.crypto.subtle)) return Promise.resolve(undefined);
        return window.crypto.subtle.digest('SHA-256', new TextEncoder().encode(s))
          .then(function (buf) { return Array.prototype.map.call(new Uint8Array(buf), function (b) { return ('0' + b.toString(16)).slice(-2); }).join(''); })
          .catch(function () { return undefined; });
      }

      // Best-effort identify, then fire. Never let it block the event:
      // fire on resolve OR reject, plus a safety-net timeout.
      var email = String(ident.email || '').trim().toLowerCase();
      var digits = String(ident.whatsapp || '').replace(/\D/g, '').replace(/^57/, '');
      var phone = digits ? '+57' + digits : '';   // E.164 for hashing

      try {
        Promise.all([sha256(email), sha256(phone)]).then(function (h) {
          try {
            if ((h[0] || h[1]) && typeof ttq.identify === 'function') {
              var id = {};
              if (h[0]) id.email = h[0];
              if (h[1]) id.phone_number = h[1];
              ttq.identify(id);
            }
          } catch (_) {}
          firePurchase();
        }, firePurchase);
      } catch (_) { firePurchase(); }

      // Safety net: if hashing never settles, fire anyway.
      setTimeout(firePurchase, 800);
    })();
  </script>
