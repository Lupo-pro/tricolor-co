<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560" role="img" aria-label="La Cafetera · body rojo · número 9">
  <title>La Cafetera</title>
  <desc>Body rojo edición Cafetera, número 9 al pecho — LATRICOLOR.CO</desc>

  <defs>
    <linearGradient id="cafRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E63946"/>
      <stop offset="100%" stop-color="#B0202A"/>
    </linearGradient>
  </defs>

  <path
    d="M88 56 Q112 24 152 32 L200 48 L248 32 Q288 24 312 56 L328 144 Q320 200 304 240 L288 352 Q288 440 264 488 L248 536 Q224 552 200 528 Q176 552 152 536 L136 488 Q112 440 112 352 L96 240 Q80 200 72 144 Z"
