    stroke="#0A0A0A"
    stroke-width="6"
    stroke-linejoin="round"
  />

  <!-- V-neck cut -->
  <path d="M160 48 L200 112 L240 48" fill="#0A0A0A"/>

  <!-- Jersey number 09 -->
  <text x="200" y="320"
    text-anchor="middle"
    font-family="Anton, Impact, Arial Black, sans-serif"
    font-size="120"
    font-weight="900"
    fill="#F0EBE0"
    letter-spacing="-4"
