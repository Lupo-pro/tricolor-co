  <!-- Coffee bean accent — a little wink at "Cafetera" -->
  <ellipse cx="200" cy="200" rx="14" ry="22" fill="#F0EBE0" opacity="0.85"/>
  <path d="M200 180 Q198 200 200 220" stroke="#E63946" stroke-width="2" fill="none"/>

  <!-- Sleeve tricolor band -->
  <rect x="80"  y="120" width="32" height="10" fill="#FFD300"/>
  <rect x="80"  y="130" width="32" height="10" fill="#0033A0"/>
  <rect x="80"  y="140" width="32" height="10" fill="#F0EBE0"/>
  <rect x="288" y="120" width="32" height="10" fill="#FFD300"/>
  <rect x="288" y="130" width="32" height="10" fill="#0033A0"/>
  <rect x="288" y="140" width="32" height="10" fill="#F0EBE0"/>

  <!-- Brand footer -->
  <text x="200" y="552"
    text-anchor="middle"
    font-family="Bebas Neue, Anton, Arial Black, sans-serif"
    font-size="16"
    fill="#F0EBE0"
