  <!-- Gold sleeve trim -->
  <rect x="80"  y="120" width="40" height="3" fill="url(#oroGold)"/>
  <rect x="80"  y="128" width="40" height="3" fill="url(#oroGold)"/>
  <rect x="280" y="120" width="40" height="3" fill="url(#oroGold)"/>
  <rect x="280" y="128" width="40" height="3" fill="url(#oroGold)"/>

  <!-- Brand footer -->
  <text x="200" y="552"
    text-anchor="middle"
    font-family="Bebas Neue, Anton, Arial Black, sans-serif"
    font-size="16"
