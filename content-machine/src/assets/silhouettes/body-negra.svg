  />

  <!-- V-neck cut (gold accent) -->
  <path d="M160 48 L200 112 L240 48" fill="url(#oroGold)"/>

  <!-- Jersey number 07 -->
  <text x="200" y="320"
    text-anchor="middle"
    font-family="Anton, Impact, Arial Black, sans-serif"
    font-size="120"
    font-weight="900"
    fill="url(#oroGold)"
    letter-spacing="-4"
