<!DOCTYPE html>
<html lang="es-CO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Swipe · LATRICOLOR.CO Content</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/styles.css">
</head>
<body>

<header class="bar">
  <div class="brand">
    <span class="tri">Tri</span><span class="co">co</span><span class="lor">lor</span>
    <span class="brand-tag">· Content</span>
  </div>
  <nav class="tabs">
    <a href="/swipe" class="active">Swipe</a>
    <a href="/calendar">Calendar</a>
    <a href="/insights">Insights</a>
    <a href="/stockpile">Stockpile</a>
  </nav>
  <div class="bar-spacer"></div>
  <span class="counts">
    <span class="pending">⏱ <strong id="cPending">0</strong> pendientes</span>
    <span class="approved">✓ <strong id="cApproved">0</strong> aprobados</span>
    <span class="rejected">✗ <strong id="cRejected">0</strong> rechazados</span>
  </span>
  <label class="claude-toggle" title="When ON, captions are generated by Claude (costs API credits). When OFF, captions are placeholders.">
    <input type="checkbox" id="useClaude">
    <span>Claude <span id="claudeBadge" class="badge">…</span></span>
  </label>
  <button class="bar-btn alt" id="btnBuildDay" type="button" title="Generate drafts for today">↻ Build day</button>
  <button class="bar-btn alt" id="btnBuildWeek" type="button" title="Generate drafts for the next 7 days">📅 Build week</button>
  <button class="bar-btn alt" id="btnBuildMonth" type="button" title="Generate drafts for the next 30 days (asks confirmation)">📅📅 Build month</button>
  <button class="bar-btn" id="btnPack" type="button">📦 Build pack</button>
</header>

<div id="confirmOverlay" class="progress-overlay" hidden>
  <div class="progress-panel">
    <div class="progress-title" id="confirmTitle">Confirm</div>
    <div class="progress-meta" id="confirmBody"></div>
    <div id="confirmButtons" style="display:flex; flex-wrap:wrap; gap:0.5rem; margin-top:1rem; justify-content:flex-end;"></div>
  </div>
</div>

<div id="progressOverlay" class="progress-overlay" hidden>
  <div class="progress-panel">
    <div class="progress-title" id="progressTitle">Generating...</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-meta" id="progressMeta">0 / 0</div>
    <div class="progress-log" id="progressLog"></div>
    <div style="display:flex; gap:0.5rem; justify-content:flex-end; margin-top:0.4rem;">
      <button class="bar-btn alt" id="progressCancel" type="button">❌ Cancel</button>
      <button class="bar-btn alt" id="progressClose" type="button" hidden>Close</button>
    </div>
  </div>
</div>

<main class="stage">
  <div class="row" id="dayHeader">
    <span style="font-family:'Bebas Neue',sans-serif;letter-spacing:0.15em;text-transform:uppercase;color:var(--ink-mid);">
      Día <strong id="dayDate" style="color:var(--ink);font-family:'Anton',sans-serif;font-weight:400;">—</strong>
      · Tema <strong id="dayTheme" style="color:var(--ink);font-family:'Anton',sans-serif;font-weight:400;">—</strong>
      · Edition <strong id="dayEdition" style="color:var(--ink);font-family:'Anton',sans-serif;font-weight:400;">—</strong>
    </span>
  </div>

  <div class="day-tabs" id="dayTabs"></div>

  <div class="queue" id="queue">
    <div class="empty" id="empty">
      <strong>Cargando drafts...</strong>
      Si está vacío, haz click en <code>↻ Build day</code> para generar los visuales del día.
    </div>
  </div>
</main>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
(async function init() {
  const $queue   = document.getElementById('queue');
  const $empty   = document.getElementById('empty');
  const $toast   = document.getElementById('toast');
  const $dayDate = document.getElementById('dayDate');
  const $dayTheme = document.getElementById('dayTheme');
  const $dayEdition = document.getElementById('dayEdition');
  const $cPending  = document.getElementById('cPending');
  const $cApproved = document.getElementById('cApproved');
  const $cRejected = document.getElementById('cRejected');
  const $btnBuildDay   = document.getElementById('btnBuildDay');
  const $btnBuildWeek  = document.getElementById('btnBuildWeek');
  const $btnBuildMonth = document.getElementById('btnBuildMonth');
  const $btnPack       = document.getElementById('btnPack');
  const $confirmOverlay = document.getElementById('confirmOverlay');
  const $confirmTitle   = document.getElementById('confirmTitle');
  const $confirmBody    = document.getElementById('confirmBody');
  const $confirmButtons = document.getElementById('confirmButtons');
  const $useClaude     = document.getElementById('useClaude');
  const $claudeBadge   = document.getElementById('claudeBadge');
  const $progressOverlay = document.getElementById('progressOverlay');
  const $progressTitle = document.getElementById('progressTitle');
  const $progressFill  = document.getElementById('progressFill');
  const $progressMeta  = document.getElementById('progressMeta');
  const $progressLog   = document.getElementById('progressLog');
  const $progressClose  = document.getElementById('progressClose');
  const $progressCancel = document.getElementById('progressCancel');

  // state.days lists every date that has built drafts, used by the
  // day-tab strip. state.date is the day currently being swiped.
  let state = { date: null, manifest: null, captions: {}, approvedIds: new Set(), days: [], claudeConfigured: false };

  function toast(msg, ms = 1800, kind = 'info') {
    $toast.textContent = msg;
    $toast.classList.remove('error');
    if (kind === 'error') $toast.classList.add('error');
    $toast.classList.add('show');
    setTimeout(() => $toast.classList.remove('show'), ms);
  }
  function toastError(msg, ms = 5000) { toast(msg, ms, 'error'); }

  // chooseModal — N-option picker. Returns the `value` of the picked
  // option, or null on cancel/Esc. options: [{ label, value, primary? }]
  function chooseModal(title, body, options) {
    $confirmTitle.textContent = title;
    $confirmBody.textContent = body;
    $confirmButtons.innerHTML = '';
    return new Promise((resolve) => {
      const cleanup = (v) => { $confirmOverlay.hidden = true; resolve(v); };
      for (const opt of options) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'bar-btn' + (opt.primary ? '' : ' alt');
        btn.textContent = opt.label;
        btn.addEventListener('click', () => cleanup(opt.value));
        $confirmButtons.appendChild(btn);
      }
      $confirmOverlay.hidden = false;
    });
  }

  // Legacy yes/no confirm — still used by some buttons (Build month).
  function confirmModal(title, body) {
    return chooseModal(title, body, [
      { label: 'Cancel',  value: false },
      { label: 'Confirm', value: true, primary: true },
    ]);
  }

  function setClaudeBadge(on) {
    $claudeBadge.textContent = on ? 'ON' : 'OFF';
    $claudeBadge.classList.toggle('on', on);
    $claudeBadge.classList.toggle('off', !on);
  }

  async function loadStatus() {
    try {
      const r = await fetch('/api/status');
      const d = await r.json();
      state.claudeConfigured = !!d.claude_configured;
      if (!state.claudeConfigured) {
        $useClaude.checked = false;
        $useClaude.disabled = true;
        $useClaude.parentElement.title = 'No ANTHROPIC_API_KEY set — fill content-machine/.env to enable Claude.';
      }
      setClaudeBadge($useClaude.checked && state.claudeConfigured);
    } catch (_) { /* silent — status is optional */ }
  }
  $useClaude.addEventListener('change', () => setClaudeBadge($useClaude.checked && state.claudeConfigured));

  function setCounts() {
    if (!state.manifest) return;
    const total = state.manifest.items.length;
    const approved = state.approvedIds.size;
    const rejected = state.manifest.items.filter((i) => i.rejected_at).length;
    $cApproved.textContent = approved;
    $cRejected.textContent = rejected;
    $cPending.textContent = Math.max(0, total - approved - rejected);
    // Keep the day-tabs counter in sync without a round-trip.
    const dayCell = state.days.find((d) => d.date === state.date);
    if (dayCell) {
      dayCell.total = total;
      dayCell.approved = approved;
      dayCell.rejected = rejected;
      dayCell.pending = total - approved - rejected;
      renderDayTabs();
    }
  }

  function dayTabLabel(dateStr) {
    const today = new Date(); today.setHours(0,0,0,0);
    const d = new Date(dateStr + 'T00:00:00');
    const diff = Math.round((d - today) / 86400000);
    if (diff === 0)  return 'Hoy';
    if (diff === 1)  return 'Mañana';
    if (diff === -1) return 'Ayer';
    const dow = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'][d.getDay()];
    return `${dow} ${d.getDate()}`;
  }

  async function loadDays() {
    try {
      const r = await fetch('/api/days');
      const d = await r.json();
      state.days = (d.ok ? d.days : []);
      renderDayTabs();
    } catch (_) { /* silent */ }
  }

  function renderDayTabs() {
    const $tabs = document.getElementById('dayTabs');
    if (!$tabs) return;
    if (state.days.length <= 1) { $tabs.innerHTML = ''; return; }
    const dayHtml = state.days.map((day) => {
      const active = day.date === state.date;
      const complete = day.pending === 0 && day.total > 0;
      const cls = 'day-tab' + (active ? ' active' : '') + (!active && complete ? ' complete' : '');
      const total = day.total;
      const done = day.approved + day.rejected;
      return `<button class="${cls}" data-date="${day.date}" type="button">
        ${dayTabLabel(day.date)}
        <span class="count">${done}/${total}</span>
      </button>`;
    }).join('');
    // Trailing "→ Semana próxima" tab — triggers a Build batch
    // starting the day after the last built day. Visually distinct
    // (red bg) so it doesn't read like a regular day tab.
    const nextHtml = `<button class="day-tab next-week" id="tabNextWeek" type="button">
      → Semana próxima
    </button>`;
    $tabs.innerHTML = dayHtml + nextHtml;
    for (const btn of $tabs.querySelectorAll('.day-tab[data-date]')) {
      btn.addEventListener('click', () => switchDay(btn.dataset.date));
    }
    const $next = document.getElementById('tabNextWeek');
    if ($next) {
      $next.addEventListener('click', async () => {
        const claude = !!$useClaude.checked;
        const startDate = nextWeekStart();
        if (claude) {
          const ok = await confirmModal('Build próxima semana · with Claude',
            `7 days × ~12 items = ~84 Claude calls. Estimated cost ≈ $0.08. Start ${startDate}. Proceed?`);
          if (!ok) return;
        }
        runBuildBatch(7, claude, { startDate, titleSuffix: ' · próxima semana' });
      });
    }
  }

  async function switchDay(date) {
    state.date = date;
    await loadDay(date);
    renderDayTabs();
  }

  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }

  function renderItem(item) {
    if (state.approvedIds.has(item.id)) return null;
    if (item.rejected_at) return null;

    const card = document.createElement('article');
    card.className = 'card';
    card.dataset.id = item.id;

    // Preview pane
    const preview = document.createElement('div');
    preview.className = 'card-preview';
    if (item.kind === 'carousel') {
      preview.classList.add('carousel-preview');
      const strip = document.createElement('div');
      strip.className = 'carousel-strip';
      for (const f of item.files) {
        const img = document.createElement('img');
        img.src = `/assets/png/${state.date}/${f}`;
        img.alt = f;
        strip.appendChild(img);
      }
      preview.appendChild(strip);
      const big = document.createElement('img');
      big.src = `/assets/png/${state.date}/${item.files[0]}`;
      big.alt = 'cover';
      preview.appendChild(big);
    } else {
      const img = document.createElement('img');
      img.src = `/assets/png/${state.date}/${item.file}`;
      img.alt = item.id;
      preview.appendChild(img);
    }
    card.appendChild(preview);

    // Body pane
    const body = document.createElement('div');
    body.className = 'card-body';

    const pill = document.createElement('span');
    pill.className = `kind-pill ${item.kind}`;
    pill.textContent = item.kind === 'story'
      ? `Story · ${item.sequence} · #${item.step} ${item.role}`
      : item.kind === 'carousel'
        ? `Carousel · ${item.theme} (${item.slideCount} slides)`
        : `Feed Post · ${item.key || ''}`;
    body.appendChild(pill);

    const meta = document.createElement('div');
    meta.className = 'card-meta';
    if (item.kind === 'story') {
      meta.innerHTML = `<span>Offset <strong>${item.offsetMin}min</strong></span>
                       <span>Bg <strong>${item.bg}</strong></span>
                       <span>Accent <strong>${item.accent}</strong></span>`;
    } else if (item.kind === 'post') {
      meta.innerHTML = `<span>Bg <strong>${item.bg || '—'}</strong></span>
                       <span>Accent <strong>${item.accent || '—'}</strong></span>`;
    } else {
      meta.innerHTML = `<span>Slides <strong>${item.slideCount}</strong></span>
                       <span>Theme <strong>${item.theme}</strong></span>`;
    }
    body.appendChild(meta);

    if (item.headline) {
      const h = document.createElement('div');
      h.className = 'card-headline';
      h.textContent = item.headline;
      body.appendChild(h);
    }
    if (item.subline) {
      const s = document.createElement('div');
      s.className = 'card-subline';
      s.textContent = item.subline;
      body.appendChild(s);
    }

    // Caption (editable)
    const captionBlock = document.createElement('div');
    captionBlock.className = 'caption-block';
    const captionText = state.captions[item.caption_key] || '(sin caption)';
    captionBlock.textContent = captionText;
    captionBlock.addEventListener('click', () => toggleEdit(captionBlock, item.id, captionText));
    body.appendChild(captionBlock);

    // Actions
    const actions = document.createElement('div');
    actions.className = 'actions';
    actions.innerHTML = `
      <button class="act act-reject"  data-action="reject">✗ Reject</button>
      <button class="act act-edit"    data-action="edit">✎ Edit</button>
      <button class="act act-approve" data-action="approve">✓ Approve</button>
      <button class="act act-skip"    data-action="skip">⏭ Skip</button>
    `;
    actions.querySelectorAll('.act').forEach((btn) => {
      btn.addEventListener('click', () => act(btn.dataset.action, item, card, captionBlock));
    });
    body.appendChild(actions);

    card.appendChild(body);
    return card;
  }

  function toggleEdit(block, id, current) {
    if (block.classList.contains('editing')) return;
    block.classList.add('editing');
    const ta = document.createElement('textarea');
    ta.className = 'caption-edit-area';
    ta.value = current;
    block.textContent = '';
    block.appendChild(ta);
    const tip = document.createElement('div');
    tip.style.cssText = 'font-family:Bebas Neue;font-size:0.7rem;letter-spacing:0.12em;color:var(--muted);margin-top:0.4rem;text-transform:uppercase;';
    tip.textContent = 'Ctrl+Enter para guardar · Esc para cancelar';
    block.appendChild(tip);
    ta.focus();
    ta.select();

    const close = (save) => {
      block.classList.remove('editing');
      if (save) {
        const newCaption = ta.value;
        state.captions[id] = newCaption;
        block.textContent = newCaption || '(sin caption)';
        fetch('/api/edit-caption', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ date: state.date, id, caption: newCaption }) })
          .then(() => toast('✓ Caption guardada'))
          .catch(() => toast('Error al guardar'));
      } else {
        block.textContent = state.captions[id] || '(sin caption)';
      }
    };
    ta.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); close(true); }
      if (e.key === 'Escape') { e.preventDefault(); close(false); }
    });
    ta.addEventListener('blur', () => close(true));
  }

  async function act(action, item, card, captionBlock) {
    if (action === 'edit') {
      const captionText = state.captions[item.caption_key] || '';
      toggleEdit(captionBlock, item.id, captionText);
      return;
    }
    if (action === 'skip') {
      card.classList.add('gone-up');
      setTimeout(() => card.remove(), 220);
      toast('Skipped (queda para mañana)');
      return;
    }
    if (action === 'reject') {
      card.classList.add('gone-left');
      try {
        await fetch('/api/reject', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ date: state.date, id: item.id }) });
        toast('✗ Rejected');
      } catch (_) { toast('Error al rechazar'); }
      const local = state.manifest.items.find((i) => i.id === item.id);
      if (local) local.rejected_at = new Date().toISOString();
      setCounts();
      setTimeout(() => card.remove(), 250);
      return;
    }
    if (action === 'approve') {
      card.classList.add('gone-right');
      try {
        await fetch('/api/approve', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ date: state.date, id: item.id }) });
        state.approvedIds.add(item.id);
        setCounts();
        toast('✓ Approved');
      } catch (e) { toast('Error · ' + e.message); }
      setTimeout(() => card.remove(), 250);
      return;
    }
  }

  function renderSequenceBar(sequence) {
    const items = state.manifest.items.filter((i) => i.kind === 'story' && i.sequence === sequence);
    if (!items.length) return null;
    const allApproved = items.every((i) => state.approvedIds.has(i.id));
    if (allApproved) return null;

    const bar = document.createElement('section');
    bar.className = 'sequence-bar';
    bar.dataset.sequence = sequence;
    bar.innerHTML = `
      <header>
        <div class="title">📖 Sequence · ${sequence} · ${items.length} stories</div>
        <button class="approve-all">✓ Approve all</button>
      </header>
      <div class="thumbs">
        ${items.map((it) => `<img src="/assets/png/${state.date}/${it.file}" alt="${it.id}" />`).join('')}
      </div>
    `;
    bar.querySelector('.approve-all').addEventListener('click', async () => {
      try {
        const r = await fetch('/api/approve-sequence', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ date: state.date, sequence }) });
        const data = await r.json();
        if (data.ok) {
          for (const a of data.approved) state.approvedIds.add(a.id);
          setCounts();
          toast(`✓ ${data.count} stories approved`);
          render();
        } else {
          toast('Error · ' + (data.error || 'unknown'));
        }
      } catch (e) { toast('Error · ' + e.message); }
    });
    return bar;
  }

  function render() {
    $queue.innerHTML = '';
    if (!state.manifest) {
      $queue.appendChild($empty);
      return;
    }
    setCounts();

    // Sequence bars first (so the operator can approve a whole batch
    // before drilling into individual stories).
    const seenSequences = new Set();
    for (const it of state.manifest.items) {
      if (it.kind !== 'story') continue;
      if (seenSequences.has(it.sequence)) continue;
      seenSequences.add(it.sequence);
      const bar = renderSequenceBar(it.sequence);
      if (bar) $queue.appendChild(bar);
    }

    // Then per-item cards (any non-approved, non-rejected).
    let cards = 0;
    for (const it of state.manifest.items) {
      const card = renderItem(it);
      if (card) { $queue.appendChild(card); cards += 1; }
    }
    if (cards === 0 && seenSequences.size === 0) {
      $empty.innerHTML = `<strong>Todo aprobado · ${state.approvedIds.size}</strong>
        Hacé click en <code>📦 Build pack</code> para preparar el ZIP del día.`;
      $queue.appendChild($empty);
    }
  }

  async function loadDay(date) {
    try {
      const r = await fetch(`/api/day/${date}`);
      const data = await r.json();
      if (!data.ok) throw new Error(data.error || 'load failed');
      state.date = data.date;
      state.manifest = data.manifest;
      state.captions = data.captions || {};
      state.approvedIds = new Set(data.approvedIds || []);
      if (!state.manifest) {
        $dayDate.textContent = state.date;
        $dayTheme.textContent = '— sin drafts —';
        $dayEdition.textContent = '—';
        $empty.innerHTML = `<strong>No hay drafts para ${state.date}</strong>
          Hacé click en <code>↻ Build day</code> arriba para generarlos.`;
        $queue.innerHTML = '';
        $queue.appendChild($empty);
        setCounts();
        return;
      }
      $dayDate.textContent = state.date;
      $dayTheme.textContent = state.manifest.theme || '—';
      $dayEdition.textContent = state.manifest.edition_focus || '—';
      render();
    } catch (e) {
      toastError('Load failed: ' + e.message);
    }
  }

  async function load() {
    await loadDays();
    // Pick a default day: today if it has drafts, else newest with
    // pending items, else just the newest available.
    const today = new Date().toISOString().slice(0, 10);
    let target = state.days.find((d) => d.date === today);
    if (!target) target = state.days.find((d) => d.pending > 0);
    if (!target) target = state.days[state.days.length - 1];
    state.date = target ? target.date : today;
    await loadDay(state.date);
    renderDayTabs();
  }

  // ───── Build week (SSE streaming) ─────
  function openProgress(title) {
    $progressTitle.textContent = title;
    $progressFill.style.width = '0%';
    $progressMeta.textContent = '0 / 0';
    $progressLog.innerHTML = '';
    $progressClose.hidden = true;
    $progressOverlay.hidden = false;
  }
  function progressLine(text, cls = 'info') {
    const div = document.createElement('div');
    div.className = cls;
    div.textContent = text;
    $progressLog.appendChild(div);
    $progressLog.scrollTop = $progressLog.scrollHeight;
  }
  function setProgress(done, total) {
    const pct = total ? Math.round((done / total) * 100) : 0;
    $progressFill.style.width = pct + '%';
    $progressMeta.textContent = `${done} / ${total} · ${pct}%`;
  }

  // Active fetch controller — exposed so the Cancel button can abort.
  let _activeBuild = null;

  async function runBuildBatch(days, claude, opts = {}) {
    const { startDate, skipExisting = true, titleSuffix = '' } = opts;
    openProgress(`Building ${days} day${days > 1 ? 's' : ''}${claude ? ' · with Claude' : ''}${titleSuffix}`);
    console.log('→ runBuildBatch opts:', { days, claude, startDate, skipExisting, titleSuffix });
    console.log('→ state.days at click time:', state.days?.length || 0, 'days');
    // Cancel is visible from the very first frame so the operator
    // never gets locked out, even if the fetch hangs.
    $progressCancel.hidden = false;
    $progressClose.hidden = true;

    let total = days, done = 0;
    setProgress(0, total);
    progressLine(`Starting batch · ${days} day${days > 1 ? 's' : ''}${claude ? ' · Claude' : ''}`, 'info');

    const params = new URLSearchParams({ count: String(days), claude: claude ? '1' : '0' });
    if (startDate) params.set('startDate', startDate);
    if (skipExisting === false) params.set('skipExisting', '0');
    const url = `/api/build-week?${params.toString()}`;
    console.log(`→ Clicked Build (${days} days, claude=${claude}, startDate=${startDate || 'today'}, skipExisting=${skipExisting})`);
    console.log(`→ Opening fetch ${url}`);
    // Surface the exact URL inside the modal so the operator doesn't
    // need DevTools to see what's being hit. Truncated if the params
    // grow long but the full string is in the console.
    progressLine(`GET ${url}`, 'info');

    const ac = new AbortController();
    _activeBuild = ac;

    // Startup watchdog — if the server hasn't emitted any event in 5s
    // we abort and tell the user there's no response. This catches the
    // "stuck at 0/0 forever" case where the fetch never reaches the
    // server (CORS, wrong port, server down, stale browser cache, etc.)
    let firstEventReceived = false;
    const startupTimer = setTimeout(() => {
      if (!firstEventReceived) {
        console.warn('→ Startup watchdog fired — aborting, no event in 5s');
        progressLine('✗ No response from server after 5s — aborting.', 'err');
        ac.abort();
      }
    }, 5000);

    try {
      const r = await fetch(url, { method: 'POST', signal: ac.signal });
      console.log(`→ Fetch resolved · status=${r.status} ok=${r.ok}`);
      if (!r.ok) {
        let err = `HTTP ${r.status}`;
        try { const j = await r.json(); err = j.error || err; } catch {}
        throw new Error(err);
      }
      if (!r.body) throw new Error('Streaming not supported by this browser');

      const reader = r.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';
      while (true) {
        const { done: streamDone, value } = await reader.read();
        if (streamDone) {
          console.log('→ Stream closed by server');
          break;
        }
        buf += decoder.decode(value, { stream: true });
        const parts = buf.split('\n\n');
        buf = parts.pop() || '';
        for (const ev of parts) {
          const line = ev.split('\n').find((l) => l.startsWith('data:'));
          if (!line) continue;
          let data; try { data = JSON.parse(line.slice(5).trim()); } catch { continue; }
          console.log(`→ Received event: ${data.type}`, data);
          if (!firstEventReceived) {
            firstEventReceived = true;
            clearTimeout(startupTimer);
          }
          if (typeof data.total === 'number' && data.total > 0) total = data.total;

          if (data.type === 'start') {
            setProgress(done, total);
            progressLine(`Queued ${data.total} day${data.total > 1 ? 's' : ''}: ${data.dates.join(' · ')}`, 'info');
            if (data.skipExisting === false) {
              progressLine(`(skipExisting OFF — every day will be rebuilt)`, 'info');
            }
          } else if (data.type === 'day-start') {
            const idx = data.index || (done + 1);
            progressLine(`▶ Day ${idx}/${total} · ${data.date} · building...`, 'info');
            setProgress(done, total);
          } else if (data.type === 'day-skipped') {
            done++;
            progressLine(`⊘ Day ${data.index || done}/${total} · ${data.date} · already built (skipped)`, 'info');
            setProgress(done, total);
          } else if (data.type === 'day-ok') {
            done++;
            const elapsed = data.elapsedMs ? ` (${(data.elapsedMs/1000).toFixed(1)}s)` : '';
            progressLine(`✓ Day ${data.index || done}/${total} · ${data.date} · ${data.items} drafts${elapsed}`, 'ok');
            setProgress(done, total);
          } else if (data.type === 'day-error') {
            progressLine(`✗ Day ${data.index || ''}/${total} · ${data.date} · ${data.error}`, 'err');
            setProgress(done, total);
          } else if (data.type === 'done') {
            const elapsed = data.elapsedMs ? ` in ${(data.elapsedMs/1000).toFixed(1)}s` : '';
            const builtPart = `${data.total_drafts} drafts across ${data.days} day${data.days === 1 ? '' : 's'}`;
            const skippedPart = data.skipped > 0 ? ` · ${data.skipped} skipped (already built)` : '';
            progressLine(`\nDone${elapsed} · ${builtPart}${skippedPart}.`, 'ok');
          } else if (data.type === 'fatal') {
            progressLine(`✗ FATAL · ${data.error}`, 'err');
          }
        }
      }
      toast(`✓ ${done} days processed`);
      await load();
    } catch (e) {
      if (e.name === 'AbortError') {
        console.log('→ Build aborted by user or watchdog');
        progressLine('Build cancelled.', 'err');
      } else {
        console.error('→ Build failed:', e);
        progressLine(`✗ ${e.message}`, 'err');
        toastError('Build failed:\n' + e.message);
      }
    } finally {
      clearTimeout(startupTimer);
      _activeBuild = null;
      $progressCancel.hidden = true;
      $progressClose.hidden = false;
    }
  }

  function closeProgress() {
    if (_activeBuild) {
      console.log('→ User cancelled build');
      try { _activeBuild.abort(); } catch (_) {}
      _activeBuild = null;
    }
    $progressOverlay.hidden = true;
  }

  $progressCancel.addEventListener('click', closeProgress);
  $progressClose .addEventListener('click', () => { $progressOverlay.hidden = true; });

  // Esc dismisses the progress overlay too — same path as the Cancel
  // button so an aborted build cleans up consistently.
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Escape') return;
    if (!$progressOverlay.hidden) closeProgress();
    else if (!$confirmOverlay.hidden) $confirmOverlay.hidden = true;
  });

  function addDaysISO(dateStr, n) {
    const d = new Date(dateStr + 'T00:00:00Z');
    d.setUTCDate(d.getUTCDate() + n);
    return d.toISOString().slice(0, 10);
  }

  // Resolve "next week" start: day after the latest already-built day.
  function nextWeekStart() {
    if (!state.days || state.days.length === 0) {
      return new Date().toISOString().slice(0, 10);
    }
    const lastBuilt = state.days[state.days.length - 1].date;
    return addDaysISO(lastBuilt, 1);
  }

  // How many of the next 7 days starting at `startDate` already have
  // a built manifest? Used to decide whether to show the choice modal.
  function alreadyBuiltCount(startDate, count = 7) {
    if (!state.days || state.days.length === 0) return 0;
    const built = new Set(state.days.map((d) => d.date));
    let n = 0;
    for (let i = 0; i < count; i++) {
      if (built.has(addDaysISO(startDate, i))) n++;
    }
    return n;
  }

  $btnBuildWeek.addEventListener('click', async () => {
    const claude = !!$useClaude.checked;
    const today = new Date().toISOString().slice(0, 10);
    const builtInWindow = alreadyBuiltCount(today, 7);

    let startDate = today;
    let titleSuffix = '';
    if (builtInWindow > 0) {
      // User has overlap — let them pick.
      const choice = await chooseModal(
        'Build week',
        `Tienes ${builtInWindow} día${builtInWindow > 1 ? 's' : ''} ya construido${builtInWindow > 1 ? 's' : ''} esta semana. ¿Qué hago?`,
        [
          { label: 'Cancel',                    value: 'cancel' },
          { label: '📅 Esta semana (skip)',      value: 'this',   primary: false },
          { label: '📅+ Semana próxima',         value: 'next',   primary: true  },
        ],
      );
      if (!choice || choice === 'cancel') return;
      if (choice === 'next') {
        startDate = nextWeekStart();
        titleSuffix = ' · próxima semana';
      }
    }

    if (claude) {
      const ok = await confirmModal('Build week · with Claude',
        `7 days × ~12 items = ~84 Claude calls. Estimated cost ≈ $0.08. Start ${startDate}. Proceed?`);
      if (!ok) return;
    }
    runBuildBatch(7, claude, { startDate, titleSuffix });
  });

  $btnBuildMonth.addEventListener('click', async () => {
    const claude = !!$useClaude.checked;
    const ok = await confirmModal('Build month · 30 days',
      claude
        ? '30 days × ~12 items = ~360 Claude calls. Estimated cost ≈ $0.36. This takes 5-10 minutes. Proceed?'
        : '30 days × ~12 items = ~360 drafts (no Claude, no API cost). Takes ~3 minutes. Proceed?');
    if (!ok) return;
    runBuildBatch(30, claude);
  });

  $btnBuildDay.addEventListener('click', async () => {
    $btnBuildDay.disabled = true;
    $btnBuildDay.textContent = '⏳ Building...';
    const claude = !!$useClaude.checked;
    try {
      const r = await fetch('/api/build-day', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ claude }),
      });
      const data = await r.json();
      if (data.ok) {
        toast(`✓ Drafts generated${claude ? ' · Claude' : ' · placeholders'}`);
        await load();
      } else {
        toastError('Build failed:\n' + (data.error || 'unknown'));
      }
    } catch (e) {
      toastError('Build failed:\n' + e.message);
    } finally {
      $btnBuildDay.disabled = false;
      $btnBuildDay.textContent = '↻ Build day';
    }
  });

  $btnPack.addEventListener('click', async () => {
    $btnPack.disabled = true;
    $btnPack.textContent = '⏳ Packing...';
    try {
      const r = await fetch('/api/build-pack', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({}) });
      const data = await r.json();
      if (data.ok) {
        toast('✓ Pack ready · descargando');
        window.location.href = data.zipUrl;
      } else {
        toast('Error · ' + (data.error || 'unknown'));
      }
    } catch (e) { toast('Error · ' + e.message); }
    finally { $btnPack.disabled = false; $btnPack.textContent = '📦 Build pack'; }
  });

  await loadStatus();
  await load();
})();
</script>
</body>
</html>
