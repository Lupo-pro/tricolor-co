<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" role="img" aria-label="La Tribu — bolso tricolor grande tejido a mano en crochet con banderola amarilla, azul y roja">
  <defs>
    <pattern id="weaveT" width="22" height="22" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="22" height="22" fill="none"/>
      <line x1="0" y1="11" x2="22" y2="11" stroke="rgba(255,255,255,0.22)" stroke-width="3"/>
      <line x1="11" y1="0" x2="11" y2="22" stroke="rgba(0,0,0,0.06)" stroke-width="3"/>
    </pattern>
    <!-- Bigger, fuller tote — "más grande, más bandera" -->
    <clipPath id="bagT">
      <path d="M180 410
               Q180 380 215 380
               L585 380
               Q620 380 620 410
               L632 800
               Q632 870 560 870
               L240 870
               Q168 870 168 800 Z"/>
    </clipPath>
  </defs>

  <rect width="800" height="1000" fill="#F0EBE0"/>

  <!-- Twin handles, wider apart -->
  <path d="M275 392 Q275 280 380 280 Q485 280 485 392"
        fill="none" stroke="#0A0A0A" stroke-width="18" stroke-linecap="round"/>
  <path d="M275 392 Q275 280 380 280 Q485 280 485 392"
        fill="none" stroke="#D9B400" stroke-width="8" stroke-linecap="round"/>
  <path d="M460 392 Q460 290 545 290 Q620 290 620 392"
        fill="none" stroke="#0A0A0A" stroke-width="18" stroke-linecap="round" opacity="0.85"/>

  <g clip-path="url(#bagT)">
    <rect x="160" y="375" width="480" height="175" fill="#FFD300"/>
    <rect x="160" y="550" width="480" height="165" fill="#0033A0"/>
    <rect x="160" y="715" width="480" height="180" fill="#E63946"/>
    <rect x="160" y="375" width="480" height="520" fill="url(#weaveT)"/>
  </g>

  <path d="M180 410 Q180 380 215 380 L585 380 Q620 380 620 410 L632 800 Q632 870 560 870 L240 870 Q168 870 168 800 Z"
        fill="none" stroke="#0A0A0A" stroke-width="8"/>

  <text x="400" y="940" text-anchor="middle" font-family="Anton, Arial, sans-serif"
        font-size="46" letter-spacing="2" fill="#0A0A0A">LA TRIBU</text>
  <text x="400" y="978" text-anchor="middle" font-family="Inter, Arial, sans-serif"
        font-size="22" letter-spacing="4" fill="#4A4A48">DIVARTE × LATRICOLOR · #02</text>
  <text x="400" y="120" text-anchor="middle" font-family="Inter, Arial, sans-serif"
        font-size="22" font-style="italic" letter-spacing="2" fill="#8A867E">Hecho a mano · hilo por hilo</text>
</svg>
