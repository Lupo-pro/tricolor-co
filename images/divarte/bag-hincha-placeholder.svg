<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" role="img" aria-label="La Hincha — bolso tricolor tejido a mano en crochet con banderola amarilla, azul y roja">
  <defs>
    <!-- Crochet weave hint: fine diagonal stitches over the bag body -->
    <pattern id="weaveH" width="22" height="22" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="22" height="22" fill="none"/>
      <line x1="0" y1="11" x2="22" y2="11" stroke="rgba(255,255,255,0.22)" stroke-width="3"/>
      <line x1="11" y1="0" x2="11" y2="22" stroke="rgba(0,0,0,0.06)" stroke-width="3"/>
    </pattern>
    <!-- Bag silhouette: rounded body, wider rounded base -->
    <clipPath id="bagH">
      <path d="M210 430
               Q210 400 240 400
               L560 400
               Q590 400 590 430
               L600 770
               Q600 840 530 840
               L270 840
               Q200 840 200 770 Z"/>
    </clipPath>
  </defs>

  <!-- Crema backdrop -->
  <rect width="800" height="1000" fill="#F0EBE0"/>

  <!-- Handles -->
  <path d="M300 410 Q300 300 400 300 Q500 300 500 410"
        fill="none" stroke="#0A0A0A" stroke-width="18" stroke-linecap="round"/>
  <path d="M300 410 Q300 300 400 300 Q500 300 500 410"
        fill="none" stroke="#D9B400" stroke-width="8" stroke-linecap="round"/>

  <!-- Tricolor body, banded into the bandera -->
  <g clip-path="url(#bagH)">
    <rect x="190" y="395" width="420" height="160" fill="#FFD300"/>
    <rect x="190" y="555" width="420" height="150" fill="#0033A0"/>
    <rect x="190" y="705" width="420" height="160" fill="#E63946"/>
    <rect x="190" y="395" width="420" height="470" fill="url(#weaveH)"/>
  </g>

  <!-- Hard outline -->
  <path d="M210 430 Q210 400 240 400 L560 400 Q590 400 590 430 L600 770 Q600 840 530 840 L270 840 Q200 840 200 770 Z"
        fill="none" stroke="#0A0A0A" stroke-width="8"/>

  <!-- Labels -->
  <text x="400" y="918" text-anchor="middle" font-family="Anton, Arial, sans-serif"
        font-size="46" letter-spacing="2" fill="#0A0A0A">LA HINCHA</text>
  <text x="400" y="956" text-anchor="middle" font-family="Inter, Arial, sans-serif"
        font-size="22" letter-spacing="4" fill="#4A4A48">DIVARTE × LATRICOLOR · #01</text>
  <text x="400" y="120" text-anchor="middle" font-family="Inter, Arial, sans-serif"
        font-size="22" font-style="italic" letter-spacing="2" fill="#8A867E">Hecho a mano · hilo por hilo</text>
</svg>
