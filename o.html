<!DOCTYPE html>
<html lang="es-CO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>LATRICOLOR 🇨🇴</title>
<link rel="canonical" href="https://latricolor.co/oferta">

<!-- ============================================================
     A/B/C TRAFFIC SPLITTER — latricolor.co/o
     This is the single URL we point TikTok ads to. It assigns a
     variant (33/33/33), persists it in a 30-day cookie so a returning
     visitor always sees the SAME variant (no flicker), preserves the
     ad's UTM params, appends ?v=<variant>, and redirects.

     The script runs synchronously in <head>, BEFORE the body paints,
     and uses location.replace() (no history entry, no back-button
     trap). Net effect: an effectively invisible hop.
     ============================================================ -->
<script>
(function () {
  var DEST   = { A: '/oferta', B: '/oferta-2', C: '/oferta-3' };
  var COOKIE = 'latricolor_variant';
  var DAYS   = 30;

  function getCookie(name) {
    var m = document.cookie.match('(?:^|; )' + name + '=([^;]*)');
    return m ? decodeURIComponent(m[1]) : null;
  }
  function setCookie(name, value, days) {
    var d = new Date();
    d.setTime(d.getTime() + days * 86400000);
    document.cookie = name + '=' + encodeURIComponent(value) +
      '; expires=' + d.toUTCString() + '; path=/; SameSite=Lax';
  }

  var params = new URLSearchParams(window.location.search);

  // 1) ?v=A|B|C override forces a specific variant (and pins the cookie).
  var forced = (params.get('v') || '').toUpperCase();
  var v = DEST[forced] ? forced : null;

  // 2) Otherwise a returning visitor keeps their cookie variant.
  if (!v) v = getCookie(COOKIE);

  // 3) Otherwise assign a fresh one, ~33/33/33.
  if (!v || !DEST[v]) {
    var r = Math.random();
    v = r < 1 / 3 ? 'A' : (r < 2 / 3 ? 'B' : 'C');
  }

  // Persist / refresh the 30-day expiry.
  setCookie(COOKIE, v, DAYS);

  // 4) Preserve incoming UTM (and any other) query params; set ?v=.
  params.set('v', v);

  window.location.replace(DEST[v] + '?' + params.toString());
})();
</script>
</head>
<body>
<!-- Fallback if JS is disabled: send them to variant A. -->
<noscript><meta http-equiv="refresh" content="0; url=/oferta"></noscript>
<p style="font-family:system-ui,sans-serif;text-align:center;margin-top:40px">Redirigiendo… <a href="/oferta">Continuar</a></p>
</body>
</html>
